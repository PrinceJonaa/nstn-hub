<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NSTN Hub</title>
  <script>
    // Redirect 404s back to index with the path as a query param
    const path = window.location.pathname;
    window.location.replace('/?redirect=' + encodeURIComponent(path));
  </script>
</head>
</html>
